<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>個人學習歷程成果展現</title>

<style>

:root{
    --primary-color:#00a8e8;
    --elective-color:#ff9f43;
    --extra-color:#9b59b6;
    --bg-color:#f4f7f6;
}

body{
    font-family:"Microsoft JhengHei",sans-serif;
    background-color:var(--bg-color);
    margin:0;
}

header{
    background:var(--primary-color);
    color:white;
    text-align:center;
    padding:2.5rem 0;
}

/* 導航列 */

.nav-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin:25px 0;
}

.nav-btn{
    padding:12px 30px;
    border:none;
    background:white;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.nav-btn.active{
    background:var(--primary-color);
    color:white;
}

.nav-btn.special.active{
    background:var(--extra-color);
}

/* 內容區 */

.content-section{
    display:none;
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.content-section.active{
    display:block;
}

/* grid */

.subject-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.subject-card{
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    border-left:6px solid var(--primary-color);
    cursor:pointer;
    transition:0.3s;
}

.subject-card:hover{
    transform:translateY(-5px);
}

/* 標題 */

.category-title{
    margin-top:40px;
    border-bottom:3px solid #ddd;
    padding-bottom:10px;
    display:flex;
    align-items:center;
}

.category-title::before{
    content:"";
    width:10px;
    height:24px;
    background:var(--primary-color);
    margin-right:10px;
}

.elective-title::before{background:var(--elective-color);}
.extra-title::before{background:var(--extra-color);}

</style>

</head>

<body>

<header>
<h1>高中三年學習歷程成果</h1>
<p>系統化呈現個人學術與多元表現成果</p>
</header>

<div class="nav-container">

<button type="button" class="nav-btn active" onclick="showGrade(this,'grade1')">
高一 (G10)
</button>

<button type="button" class="nav-btn" onclick="showGrade(this,'grade2')">
高二 (G11)
</button>

<button type="button" class="nav-btn" onclick="showGrade(this,'grade3')">
高三 (G12)
</button>

<button type="button" class="nav-btn special" onclick="showGrade(this,'extra-activities')">
多元表現
</button>

</div>

<div id="grade1" class="content-section active">

<h3 class="category-title">必修科目</h3>

<div class="subject-grid">
<div class="subject-card" onclick="alert('開啟高一國文作品連結')">國文</div>
<div class="subject-card">英文</div>
<div class="subject-card">數學</div>
<div class="subject-card">物理</div>
<div class="subject-card">化學</div>
<div class="subject-card">生物</div>
</div>

</div>

<div id="grade2" class="content-section">

<h3 class="category-title">必修科目</h3>

<div class="subject-grid">
<div class="subject-card">國文</div>
<div class="subject-card">英文</div>
<div class="subject-card">數學</div>
<div class="subject-card">歷史</div>
<div class="subject-card">地理</div>
<div class="subject-card">公民</div>
</div>

<h3 class="category-title elective-title">選修科目</h3>

<div class="subject-grid">
<div class="subject-card" style="border-left-color:var(--elective-color)">物理</div>
<div class="subject-card" style="border-left-color:var(--elective-color)">化學</div>
<div class="subject-card" style="border-left-color:var(--elective-color)">生物</div>
</div>

</div>

<div id="grade3" class="content-section">

<h3 class="category-title">必修科目</h3>

<div class="subject-grid">
<div class="subject-card">國文</div>
<div class="subject-card">英文</div>
<div class="subject-card">數學</div>
<div class="subject-card">歷史</div>
<div class="subject-card">地理</div>
<div class="subject-card">公民</div>
</div>

</div>

<div id="extra-activities" class="content-section">

<h3 class="category-title extra-title">高中三年多元表現</h3>

<div class="subject-grid">
<div class="subject-card" style="border-left-color:var(--extra-color)">社團活動</div>
<div class="subject-card" style="border-left-color:var(--extra-color)">學科競賽</div>
<div class="subject-card" style="border-left-color:var(--extra-color)">自主學習計畫</div>
<div class="subject-card" style="border-left-color:var(--extra-color)">服務學習</div>
<div class="subject-card" style="border-left-color:var(--extra-color)">檢定證照</div>
<div class="subject-card" style="border-left-color:var(--extra-color)">幹部經歷</div>
</div>

</div>

<script>

function showGrade(btn,gradeId){

document.querySelectorAll('.content-section').forEach(sec=>{
sec.classList.remove('active')
})

document.querySelectorAll('.nav-btn').forEach(b=>{
b.classList.remove('active')
})

const target=document.getElementById(gradeId)

if(target){
target.classList.add('active')
}

btn.classList.add('active')

}

</script>

</body>
</html>
